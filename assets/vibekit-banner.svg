<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">Vibekit</title>
  <desc id="desc">Animated neon banner for the Vibekit project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b14">
        <animate attributeName="stop-color" values="#070b14;#111827;#070b14" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#171c37">
        <animate attributeName="stop-color" values="#171c37;#101a3a;#171c37" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#0b1120">
        <animate attributeName="stop-color" values="#0b1120;#140f2e;#0b1120" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="0" />
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="55%" stop-color="#c4b5fd" />
      <stop offset="100%" stop-color="#67e8f9" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#94a3b8" stroke-opacity="0.10" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)" rx="28" />
  <rect width="1280" height="360" fill="url(#grid)" rx="28" />

  <g opacity="0.9" filter="url(#glow)">
    <circle cx="1030" cy="92" r="88" fill="#8b5cf6" fill-opacity="0.22">
      <animate attributeName="cy" values="92;118;92" dur="6s" repeatCount="indefinite" />
      <animate attributeName="r" values="88;98;88" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="1140" cy="248" r="110" fill="#22d3ee" fill-opacity="0.16">
      <animate attributeName="cx" values="1140;1080;1140" dur="7s" repeatCount="indefinite" />
      <animate attributeName="r" values="110;124;110" dur="7s" repeatCount="indefinite" />
    </circle>
    <circle cx="154" cy="284" r="84" fill="#f472b6" fill-opacity="0.10">
      <animate attributeName="cx" values="154;190;154" dur="9s" repeatCount="indefinite" />
    </circle>
  </g>

  <g opacity="0.25">
    <path d="M 0 280 C 170 240, 260 320, 430 280 S 770 230, 950 270 S 1130 330, 1280 290" fill="none" stroke="#67e8f9" stroke-width="2" />
    <path d="M 0 110 C 180 150, 290 50, 470 90 S 760 170, 940 120 S 1120 40, 1280 92" fill="none" stroke="#a78bfa" stroke-width="2" />
  </g>

  <g transform="skewX(-20)">
    <rect x="-360" y="48" width="280" height="264" fill="url(#beam)" opacity="0.32">
      <animate attributeName="x" values="-360;1380" dur="5.8s" repeatCount="indefinite" />
    </rect>
  </g>

  <g>
    <circle cx="848" cy="84" r="5" fill="#67e8f9">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="2.4s" repeatCount="indefinite" />
    </circle>
    <circle cx="892" cy="124" r="4" fill="#c4b5fd">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.1s" repeatCount="indefinite" />
    </circle>
    <circle cx="998" cy="72" r="3" fill="#f9a8d4">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="1.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="1098" cy="130" r="4" fill="#67e8f9">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="2.8s" repeatCount="indefinite" />
    </circle>
  </g>

  <g transform="translate(86 88)">
    <rect x="0" y="0" width="132" height="34" rx="17" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.14" />
    <text x="66" y="22" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#cbd5e1">LOCAL FIRST</text>

    <text x="0" y="116" font-family="Arial, Helvetica, sans-serif" font-size="86" font-weight="800" letter-spacing="4" fill="url(#text)">VIBEKIT</text>

    <text x="0" y="160" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="600" fill="#e2e8f0">Setup packs, MCP installs, and self-contained assistant tooling.</text>

    <text x="0" y="196" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#94a3b8">Claude Code + OpenCode + Codex with safe diffs, tracked installs, and multi-shell bootstrap.</text>

    <g transform="translate(0 228)">
      <rect x="0" y="0" width="122" height="38" rx="19" fill="#8b5cf6" fill-opacity="0.18" stroke="#8b5cf6" stroke-opacity="0.55" />
      <text x="61" y="24" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#ede9fe">CLAUDE</text>

      <rect x="136" y="0" width="148" height="38" rx="19" fill="#22d3ee" fill-opacity="0.14" stroke="#22d3ee" stroke-opacity="0.52" />
      <text x="210" y="24" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#cffafe">OPENCODE</text>

      <rect x="300" y="0" width="114" height="38" rx="19" fill="#f472b6" fill-opacity="0.14" stroke="#f472b6" stroke-opacity="0.48" />
      <text x="357" y="24" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" fill="#fce7f3">CODEX</text>
    </g>
  </g>

  <rect x="1.5" y="1.5" width="1277" height="357" rx="26.5" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="3" />
</svg>
